# =============================================================================
# IPNet Mesh — Infrastructure stack
# =============================================================================
# All infrastructure services in a single Compose file. The project directory
# is the repository root, so the root .env file is auto-discovered for ${VAR}
# interpolation — no --env-file flag or shell export is required.
#
# Every service is gated behind a profile. Select services with:
#   docker compose --profile <name> up -d
#
# Profiles:
#   traefik      Traefik reverse proxy
#   mqtt         MeshCore MQTT broker
#   postgres     PostgreSQL database server
#   redis        Redis shared cache
#   monitoring   Prometheus & Alertmanager
#   logto        LogTo identity provider (auto-starts postgres via depends_on)
#   backup       Volume backup to Backblaze B2
#   all          Every service above
#
# Examples:
#   docker compose --profile traefik up -d
#   docker compose --profile logto up -d      # brings up postgres too
#   docker compose --profile all up -d        # everything
#   docker compose --profile all down
#   docker compose --profile postgres logs -f
# =============================================================================

networks:
  proxy-net:
    external: true

volumes:
  acme_data:
    external: true
  mqtt_data:
    external: true
  postgres_data:
    external: true
  pgdump_data:
    external: true
  prometheus_data:
    external: true
  redis_data:
    external: true
  hub-prod_data:
    external: true
  hub-stg_data:
    external: true

services:
  # ---------------------------------------------------------------------------
  # Traefik — reverse proxy, HTTPS termination, certificate management
  # ---------------------------------------------------------------------------
  traefik:
    profiles: [traefik, all]
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    networks:
      - proxy-net
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
    environment:
      - CF_API_EMAIL=${DNS_API_EMAIL}
      - CF_DNS_API_TOKEN=${DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/traefik/config.yml:/etc/traefik/static/config.yml:ro
      - acme_data:/acme
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/static
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.default.acme.dnschallenge=true
      - --certificatesresolvers.default.acme.dnschallenge.provider=${DNS_PROVIDER}
      - --certificatesresolvers.default.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.default.acme.storage=/acme/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --log.level=${TRAEFIK_LOG_LEVEL:-INFO}
      - --log.format=common
      - --accesslog=true
      - --accesslog.format=common
    labels:
      - "traefik.enable=false"

  # ---------------------------------------------------------------------------
  # MQTT — MeshCore MQTT broker (shared by all hub instances)
  # ---------------------------------------------------------------------------
  mqtt:
    profiles: [mqtt, all]
    image: ghcr.io/ipnet-mesh/meshcore-mqtt-broker:latest
    container_name: mqtt
    restart: unless-stopped
    networks:
      - proxy-net
    volumes:
      - mqtt_data:/data
    environment:
      - MQTT_WS_PORT=${MQTT_PORT:-1883}
      - MQTT_HOST=0.0.0.0
      - AUTH_EXPECTED_AUDIENCE=${MQTT_TOKEN_AUDIENCE:-mqtt.localhost}
      - SUBSCRIBER_MAX_CONNECTIONS_DEFAULT=5
      - SUBSCRIBER_1=${MQTT_USERNAME:-admin}:${MQTT_PASSWORD:-admin}:1
      - ABUSE_ENFORCEMENT_ENABLED=false
      - ABUSE_DUPLICATE_WINDOW_SIZE=100
      - ABUSE_DUPLICATE_WINDOW_MS=300000
      - ABUSE_DUPLICATE_THRESHOLD=10
      - ABUSE_MAX_DUPLICATES_PER_PACKET=5
      - ABUSE_DUPLICATE_RATE_THRESHOLD=0.3
      - ABUSE_DUPLICATE_RATE_WINDOW_MS=300000
      - ABUSE_BUCKET_CAPACITY=20
      - ABUSE_BUCKET_REFILL_RATE=3
      - ABUSE_MAX_PACKET_SIZE=255
      - ABUSE_MAX_TOPICS_PER_DAY=3
      - ABUSE_ANOMALY_THRESHOLD=10
      - ABUSE_MAX_IATA_CHANGES_24H=3
      - ABUSE_TOPIC_HISTORY_SIZE=50
      - ABUSE_TOPIC_HISTORY_WINDOW_MS=86400000
      - ABUSE_PERSISTENCE_PATH=/data/abuse-detection.db
      - ABUSE_PERSISTENCE_INTERVAL_MS=300000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const s=net.createConnection(process.env.MQTT_WS_PORT||1883,'127.0.0.1',()=>{s.end();process.exit(0)});s.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),3000)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mqtt-ws.rule=Host(`mqtt.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.mqtt-ws.priority=30"
      - "traefik.http.routers.mqtt-ws.entrypoints=websecure"
      - "traefik.http.routers.mqtt-ws.tls.certresolver=default"
      - "traefik.http.services.mqtt-ws.loadbalancer.server.port=${MQTT_PORT:-1883}"

  # ---------------------------------------------------------------------------
  # PostgreSQL — shared database server
  # ---------------------------------------------------------------------------
  # Init SQL scripts in etc/postgres/init/ run on first container start.
  # Add numbered .sql/.sh files there to create databases and users.
  # Also assigned to the `logto` profile so --profile logto starts it via
  # logto's depends_on (profile-gated dependencies are not auto-started).
  postgres:
    profiles: [postgres, logto, all]
    image: postgres:${POSTGRES_IMAGE_TAG:-17-alpine}
    container_name: postgres
    restart: unless-stopped
    networks:
      - proxy-net
    labels:
      - docker-volume-backup.archive-pre=/bin/sh -c 'for db in $$(psql -U "$$POSTGRES_USER" -At -c "SELECT datname FROM pg_database WHERE datistemplate = false"); do pg_dump -U "$$POSTGRES_USER" -Fc -f "/backups/$$db.dump" "$$db"; done'
      - docker-volume-backup.copy-post=/bin/sh -c 'rm -f /backups/*.dump'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./etc/postgres/init:/docker-entrypoint-initdb.d:ro
      - pgdump_data:/backups
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_MESHCOREHUB_USERNAME=${POSTGRES_MESHCOREHUB_USERNAME:-meshcorehub}
      - POSTGRES_MESHCOREHUB_PASSWORD=${POSTGRES_MESHCOREHUB_PASSWORD}
      - POSTGRES_LOGTO_USERNAME=${POSTGRES_LOGTO_USERNAME:-logto}
      - POSTGRES_LOGTO_PASSWORD=${POSTGRES_LOGTO_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — shared in-memory cache
  # ---------------------------------------------------------------------------
  redis:
    profiles: [redis, all]
    image: redis:8-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - proxy-net
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # Monitoring — Prometheus & Alertmanager
  # ---------------------------------------------------------------------------
  prometheus:
    profiles: [monitoring, all]
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - proxy-net
    volumes:
      - ./etc/prometheus/prometheus.yml:/etc/prometheus/prometheus.tmpl.yml:ro
      - ./etc/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    user: root
    environment:
      - HUB_API_READ_KEY=${HUB_API_READ_KEY:-}
      - HUB_API_TARGET=${HUB_API_TARGET:-hub-prod-api:8000}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "$$HUB_API_READ_KEY" > /etc/prometheus/api_read_key
        sed "s|HUB_API_TARGET|$$HUB_API_TARGET|g" /etc/prometheus/prometheus.tmpl.yml > /etc/prometheus/prometheus.yml
        exec /bin/prometheus \
          --config.file=/etc/prometheus/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.external-url=https://metrics.${ROOT_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.prometheus.rule=Host(`metrics.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.prometheus.priority=30"
      - "traefik.http.routers.prometheus.entrypoints=websecure"
      - "traefik.http.routers.prometheus.tls.certresolver=default"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"
      # Stopped by the backup container during backup for a consistent TSDB snapshot
      - "docker-volume-backup.stop-during-backup=true"

  alertmanager:
    profiles: [monitoring, all]
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - proxy-net
    volumes:
      - ./etc/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.tmpl.yml:ro
    environment:
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sed "s|DISCORD_WEBHOOK_URL|$$DISCORD_WEBHOOK_URL|g" /etc/alertmanager/alertmanager.tmpl.yml > /tmp/alertmanager.yml
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --web.external-url=https://alerts.${ROOT_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.alertmanager.rule=Host(`alerts.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.alertmanager.priority=30"
      - "traefik.http.routers.alertmanager.entrypoints=websecure"
      - "traefik.http.routers.alertmanager.tls.certresolver=default"
      - "traefik.http.services.alertmanager.loadbalancer.server.port=9093"

  # ---------------------------------------------------------------------------
  # LogTo — self-hosted OIDC identity provider
  # ---------------------------------------------------------------------------
  # Core OIDC endpoint at auth.<ROOT_DOMAIN> (port 3001)
  # Admin console at id.<ROOT_DOMAIN> (port 3002)
  logto:
    profiles: [logto, all]
    image: svhd/logto:${LOGTO_IMAGE_TAG:-latest}
    container_name: logto
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - proxy-net
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://${POSTGRES_LOGTO_USERNAME}:${POSTGRES_LOGTO_PASSWORD}@postgres:5432/logto
      - PRIVATE_KEY_ROTATION_GRACE_PERIOD=${LOGTO_PRIVATE_KEY_ROTATION_GRACE_PERIOD:-3600}
      - ENDPOINT=https://auth.${ROOT_DOMAIN}
      - ADMIN_ENDPOINT=https://id.${ROOT_DOMAIN}
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm start"]
    labels:
      - "traefik.enable=true"
      # Core OIDC endpoint (port 3001) → auth.<ROOT_DOMAIN>
      - "traefik.http.routers.logto-auth.rule=Host(`auth.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.logto-auth.priority=30"
      - "traefik.http.routers.logto-auth.entrypoints=websecure"
      - "traefik.http.routers.logto-auth.tls.certresolver=default"
      - "traefik.http.routers.logto-auth.service=logto-auth"
      - "traefik.http.services.logto-auth.loadbalancer.server.port=3001"
      # Admin console (port 3002) → id.<ROOT_DOMAIN>
      - "traefik.http.routers.logto-id.rule=Host(`id.${ROOT_DOMAIN}`)"
      - "traefik.http.routers.logto-id.priority=30"
      - "traefik.http.routers.logto-id.entrypoints=websecure"
      - "traefik.http.routers.logto-id.tls.certresolver=default"
      - "traefik.http.routers.logto-id.service=logto-id"
      - "traefik.http.services.logto-id.loadbalancer.server.port=3002"

  # ---------------------------------------------------------------------------
  # Backup — volume snapshots to Backblaze B2 (offen/docker-volume-backup)
  # ---------------------------------------------------------------------------
  # Daily snapshots of hub SQLite volumes, PostgreSQL logical dumps (pg_dump),
  # Prometheus TSDB, and host deployment config directories (incl. .env files).
  # Containers labeled docker-volume-backup.stop-during-backup=true are stopped
  # before snapshotting and restarted after (currently: Prometheus).
  backup:
    profiles: [backup, all]
    image: offen/docker-volume-backup:v2
    container_name: backup
    restart: unless-stopped
    environment:
      - AWS_ENDPOINT=${B2_ENDPOINT}
      - AWS_S3_BUCKET_NAME=${B2_BUCKET_NAME}
      - AWS_ACCESS_KEY_ID=${B2_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${B2_SECRET_ACCESS_KEY}
      - BACKUP_CRON_EXPRESSION=0 0 * * *
      - BACKUP_RETENTION_DAYS=30
      - BACKUP_FILENAME=backup-%Y-%m-%dT%H-%M-%S.tar.gz
      - BACKUP_PRUNING_PREFIX=backup-
      # Forward hook (pg_dump) stdout/stderr into the backup container logs
      - EXEC_FORWARD_OUTPUT=true
    volumes:
      - hub-prod_data:/backup/sqlite/prod:ro
      - hub-stg_data:/backup/sqlite/stg:ro
      - pgdump_data:/backup/postgres:ro
      - prometheus_data:/backup/prometheus:ro
      - ${HOME}/data/apps/ipnet/infrastructure:/backup/infrastructure:ro
      - ${HOME}/data/apps/ipnet/meshcore-hub:/backup/deployments:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
