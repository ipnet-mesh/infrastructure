route:
  receiver: discord
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 24h

receivers:
  - name: discord
    slack_configs:
      - api_url: 'DISCORD_WEBHOOK_URL/slack'
        channel: '#alerts'
        title: '{{ range .Alerts }}{{ if eq .Status "firing" }}⚠{{ else }}✅{{ end }} {{ .Annotations.summary }}{{ end }}'
        text: >-
          {{ range .Alerts }}{{ .Annotations.description }}
          Severity: {{ .Labels.severity }}{{ end }}
        send_resolved: true
