global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: hub-api
    metrics_path: /metrics
    basic_auth:
      username: metrics
      password_file: /etc/prometheus/api_read_key
    static_configs:
      - targets:
          - HUB_API_TARGET
