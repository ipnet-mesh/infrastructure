groups:
  - name: meshcore
    rules:
      - alert: NodeNotSeen
        expr: time() - meshcore_node_last_seen_timestamp_seconds{role="infra"} > 72 * 3600
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Infrastructure Node Status"
          description: '{{ $labels.node_name }} ({{ printf "%.8s" $labels.public_key }}) — last seen {{ $value | humanizeDuration }} ago'
